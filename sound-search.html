<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Huueim Téyhèoy 胡音體系 | 音から字</title>
  <link rel="stylesheet" href="./site.css" />
</head>
<body>
<div class="wrap">
  <header class="siteHeader">
    <a class="brand" href="./index.html">Huueim Téyhèoy 胡音體系</a>
    <nav class="siteTabs" aria-label="Section navigation">
      <a class="siteTab" href="./index.html">字から音</a>
      <a class="siteTab current" href="./sound-search.html">音から字</a>
    </nav>
  </header>

  <div class="card">
    <div class="grid2">
      <div>
        <div class="row">
          <input id="url" type="url"
            aria-label="辞書ソースURL"
            value="./Kuankhiunn0704.txt"
            placeholder="Kuankhiunn0704.txt のURL（blobでもOK）" />
          <button id="loadUrlBtn" class="btnAccent">自動取得して読み込み</button>
        </div>
        <div class="hint">
        </div>
      </div>

      <div>
        <div class="row">
          <input id="soundQ" type="text" aria-label="検索する発音" placeholder="発音を入力 例：gonh / gòenh / dung / dùng" autocomplete="off" />
          <button id="soundSearchBtn" class="btnAccent">検索</button>
          <button id="soundDemoBtn" class="btnSecondary">デモ</button>
        </div>
        <div class="hint">
          ・`dung` のように声調記号なしで入力すると `dung / dúng / dùng` をまとめて検索します。<br>
          ・`dùng` のように声調記号ありで入力すると、その声調だけを完全一致で検索します。
        </div>
      </div>
    </div>

    <div id="status" class="status warn">未読み込み：上のURLから読み込んでください。</div>
    <div id="out" class="out"></div>
  </div>
</div>

<script src="./Kuankhiunn0704.txt.js"></script>
<script src="./dictionary-core.js"></script>
<script>
const core = window.HuDictionaryCore;
let dictionary = null;

function setStatus(msg, kind = "warn"){
  const el = document.getElementById("status");
  el.className = `status ${kind}`;
  el.textContent = msg;
}

function bindTap(el, fn){
  let locked = false;
  const run = async (e) => {
    if (locked) return;
    locked = true;
    try {
      await fn(e);
    } finally {
      setTimeout(() => { locked = false; }, 350);
    }
  };
  el.addEventListener("click", run);
  el.addEventListener("pointerup", run);
  el.addEventListener("touchend", (e) => {
    e.preventDefault();
    run(e);
  }, { passive: false });
}

function getReadingsForChar(char){
  const entries = dictionary.charIndex.get(char) || [];
  return Array.from(new Set(
    entries
      .map((entry) => entry.reading)
      .filter((reading) => typeof reading === "string" && reading.length > 0)
  )).sort((a, b) => a.localeCompare(b, "en"));
}

function renderSoundSearch(){
  const out = document.getElementById("out");
  out.innerHTML = "";

  if (!dictionary){
    out.innerHTML = '<div class="status warn">DBが未読み込みです。</div>';
    return;
  }

  const query = document.getElementById("soundQ").value.trim();
  if (!query) return;

  const result = core.searchByReading(dictionary, query);

  if (!result.groups.length){
    out.innerHTML = `<div class="status warn">${core.escapeHtml(result.exact ? "その声調の完全一致は見つかりませんでした。" : "その綴りに一致する発音は見つかりませんでした。")}</div>`;
    return;
  }

  const summary = document.createElement("div");
  summary.className = "resultsSummary";
  summary.textContent = result.exact
    ? "声調記号付き完全一致で検索中です。"
    : "声調記号なし検索のため、同じ綴りの声調違いをまとめて表示しています。";
  out.appendChild(summary);

  result.groups.forEach((group) => {
    const block = document.createElement("div");
    block.className = "charBlock";

    const title = document.createElement("div");
    title.className = "charTitle";
    title.innerHTML = `<div class="readingHeading mono">${core.escapeHtml(group.reading)}</div><div class="meta">一致字数：${group.count}</div>`;
    block.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "charGrid";

    group.items.forEach((item) => {
      const readings = getReadingsForChar(item.char);
      const readingsHtml = readings.map((reading) => {
        const matched = reading === group.reading;
        return `<span class="readingChip mono${matched ? " matched" : ""}">${core.escapeHtml(reading)}</span>`;
      }).join("");
      const tile = document.createElement("div");
      tile.className = "charTile";
      tile.title = item.xiaoyun.join(" / ");
      tile.innerHTML = `
        <div class="charTileHan">${core.escapeHtml(item.char)}</div>
        ${item.matchCount > 1 ? `<div class="charTileMeta">${item.matchCount}件</div>` : ""}
        <div class="charTileReadings">${readingsHtml}</div>
      `;
      grid.appendChild(tile);
    });

    block.appendChild(grid);
    out.appendChild(block);
  });
}

async function loadDictionary(){
  const rawUrl = document.getElementById("url").value.trim();
  if (!rawUrl) {
    setStatus("URLが空です。", "bad");
    return;
  }

  try {
    setStatus(`取得中… ${core.normalizeTextUrl(rawUrl)}`, "warn");
    const result = await core.loadDictionaryFromUrl(rawUrl);
    dictionary = result.dictionary;
    setStatus(
      `読み込み完了：字索引=${dictionary.stats.charCount} / 音索引=${dictionary.stats.readingCount} / 未対応キー=${dictionary.stats.missingCount}`,
      dictionary.stats.missingCount ? "warn" : "ok"
    );
    renderSoundSearch();
  } catch (error) {
    setStatus(`取得失敗：${String(error)}`, "bad");
  }
}

bindTap(document.getElementById("loadUrlBtn"), loadDictionary);

document.getElementById("soundSearchBtn").addEventListener("click", renderSoundSearch);
document.getElementById("soundQ").addEventListener("keydown", (e) => {
  if (e.key === "Enter") renderSoundSearch();
});
document.getElementById("soundDemoBtn").addEventListener("click", () => {
  document.getElementById("soundQ").value = "dung";
  renderSoundSearch();
});

window.addEventListener("DOMContentLoaded", () => {
  if (document.getElementById("url").value.trim()) {
    loadDictionary();
  }
});
</script>
</body>
</html>
