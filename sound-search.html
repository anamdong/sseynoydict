  <meta charset="utf-8" />

</head>
<body>
<div class="wrap">
  <header class="siteHeader">
    <a class="brand" href="./index.html">Hoe'im Tíhỳ 胡音體系</a>
    <nav class="siteTabs" aria-label="Section navigation">
      <a class="siteTab" href="./index.html">字から音</a>
      <a class="siteTab current" href="./sound-search.html">音から字</a>
      <a class="siteTab" href="./mc-tools.html">聲韻検索</a>
      <a class="siteTab" href="./text-reader.html">文章読音</a>
    </nav>
  </header>

  <div class="card">
    <div class="row">
      <input id="soundQ" type="text" aria-label="検索する発音" placeholder="例を準備中…" autocomplete="off" />
      <button id="soundSearchBtn" class="btnAccent">検索</button>
      <button id="soundDemoBtn" class="btnSecondary">デモ</button>
    </div>
    <div class="hint">
      ・`dung` のように声調記号なしで入力すると `dung / dúng / dùng` をまとめて検索します。<br>
      ・`dùng` のように声調記号ありで入力すると、その声調だけを完全一致で検索します。<br>
      ・空白またはカンマ区切りで複数の発音をまとめて検索できます。
    </div>

    <div id="status" class="status warn">辞書を自動読み込み中…</div>
    <div id="out" class="out"></div>
  </div>
</div>

<script src="./Kuankhiunn0704.txt.js?v=20260331a"></script>
<script src="./dictionary-core.js?v=20260401h"></script>
<script>
const core = window.HuDictionaryCore;
let dictionary = null;
const DEFAULT_SOURCE_URL = `./${core.LOCAL_SOURCE_NAME}`;

function setStatus(msg, kind = "warn"){
  const el = document.getElementById("status");
  el.className = `status ${kind}`;
  el.textContent = msg;
}

function getReadingsForChar(char){
  const entries = dictionary.charIndex.get(char) || [];
  return Array.from(new Set(
    entries
      .map((entry) => entry.reading)
      .filter((reading) => typeof reading === "string" && reading.length > 0)
  )).sort((a, b) => a.localeCompare(b, "en"));
}

function hasToneMarks(reading){
  return /[\u0300-\u036f]/.test(String(reading || "").normalize("NFD"));
}

function pickRandomDistinct(values, count){
  const pool = Array.from(values);
  const picks = [];

  while (pool.length && picks.length < count){
    const index = Math.floor(Math.random() * pool.length);
    picks.push(pool.splice(index, 1)[0]);
  }

  return picks;
}

function buildRandomPlaceholder(){
  const input = document.getElementById("soundQ");
  if (!dictionary || !dictionary.readingIndex || typeof dictionary.readingIndex.keys !== "function") {
    input.placeholder = "発音を入力";
    return;
  }

  const readings = Array.from(dictionary.readingIndex.keys()).filter((reading) =>
    typeof reading === "string" && reading.length > 0
  );

  if (!readings.length) {
    input.placeholder = "発音を入力";
    return;
  }

  const plainReadings = readings.filter((reading) => !hasToneMarks(reading));
  const tonedReadings = readings.filter((reading) => hasToneMarks(reading));
  const examples = [];

  const singlePlain = pickRandomDistinct(plainReadings.length ? plainReadings : readings, 1)[0];
  const singleToned = pickRandomDistinct(tonedReadings.length ? tonedReadings : readings, 1)[0];
  const spacedPair = pickRandomDistinct(plainReadings.length >= 2 ? plainReadings : readings, 2);
  const commaPair = pickRandomDistinct(readings, 2);

  if (singlePlain) examples.push(singlePlain);
  if (singleToned) examples.push(singleToned);
  if (spacedPair.length === 2) examples.push(`${spacedPair[0]} ${spacedPair[1]}`);
  if (commaPair.length === 2) examples.push(`${commaPair[0]}, ${commaPair[1]}`);

  const uniqueExamples = Array.from(new Set(examples.filter(Boolean)));
  input.placeholder = uniqueExamples.length ? `例：${uniqueExamples.join(" / ")}` : "発音を入力";
}

function renderSoundSearch(){
  const out = document.getElementById("out");
  out.innerHTML = "";

  if (!dictionary){
    out.innerHTML = '<div class="status warn">DBが未読み込みです。</div>';
    return;
  }

  const query = document.getElementById("soundQ").value.trim();
  if (!query) return;

  const result = core.searchByReadings(dictionary, query);

  if (!result.groups.length){
    const message = result.tokens.length > 1
      ? "区切った各発音に一致する結果は見つかりませんでした。"
      : (result.exact ? "その声調の完全一致は見つかりませんでした。" : "その綴りに一致する発音は見つかりませんでした。");
    out.innerHTML = `<div class="status warn">${core.escapeHtml(message)}</div>`;
    return;
  }

  const summary = document.createElement("div");
  summary.className = "resultsSummary";
  if (result.tokens.length > 1) {
    const notes = [];
    if (result.hasFolded) notes.push("声調記号なし入力は同じ綴りの声調違いをまとめています。");
    if (result.hasExact) notes.push("声調記号付き入力はその声調だけを完全一致で返します。");
    if (result.missingTokens.length) notes.push(`一致なし: ${result.missingTokens.join(", ")}`);
    summary.textContent = `${result.tokens.length}件の発音を個別検索して、結果をまとめて表示しています。${notes.length ? ` ${notes.join(" ")}` : ""}`;
  } else {
    summary.textContent = result.exact
      ? "声調記号付き完全一致で検索中です。"
      : "声調記号なし検索のため、同じ綴りの声調違いをまとめて表示しています。";
  }
  out.appendChild(summary);

  result.groups.forEach((group) => {
    const block = document.createElement("div");
    block.className = "charBlock";

    const title = document.createElement("div");
    title.className = "charTitle";
    title.innerHTML = `<div class="readingHeading mono">${core.escapeHtml(group.reading)}</div><div class="meta">一致字数：${group.count}</div>`;
    block.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "charGrid";

    group.items.forEach((item) => {
      const readings = getReadingsForChar(item.char);
      const readingsHtml = readings.map((reading) => {
        const matched = reading === group.reading;
        return `<span class="readingChip mono${matched ? " matched" : ""}">${core.escapeHtml(reading)}</span>`;
      }).join("");
      const tile = document.createElement("div");
      tile.className = "charTile";
      tile.title = item.xiaoyun.join(" / ");
      tile.innerHTML = `
        <div class="charTileHan">${core.escapeHtml(item.char)}</div>
        ${item.matchCount > 1 ? `<div class="charTileMeta">${item.matchCount}件</div>` : ""}
        <div class="charTileReadings">${readingsHtml}</div>
      `;
      grid.appendChild(tile);
    });

    block.appendChild(grid);
    out.appendChild(block);
  });
}

async function loadDictionary(rawUrl = DEFAULT_SOURCE_URL){
  try {
    setStatus(`取得中… ${core.normalizeTextUrl(rawUrl)}`, "warn");
    const result = await core.loadDictionaryFromUrl(rawUrl);
    dictionary = result.dictionary;
    buildRandomPlaceholder();
    setStatus(
      `読み込み完了：字索引=${dictionary.stats.charCount} / 音索引=${dictionary.stats.readingCount} / 未対応キー=${dictionary.stats.missingCount}`,
      dictionary.stats.missingCount ? "warn" : "ok"
    );
    renderSoundSearch();
  } catch (error) {
    setStatus(`取得失敗：${String(error)}`, "bad");
  }
}

document.getElementById("soundSearchBtn").addEventListener("click", renderSoundSearch);
document.getElementById("soundQ").addEventListener("keydown", (e) => {
  if (e.key === "Enter") renderSoundSearch();
});
document.getElementById("soundDemoBtn").addEventListener("click", () => {
  document.getElementById("soundQ").value = "dung";
  renderSoundSearch();
});

window.addEventListener("DOMContentLoaded", () => {
  loadDictionary();
});
</script>
</body>
</html>
