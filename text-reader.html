<body>
<div class="wrap">
  <header class="siteHeader">
    <a class="brand" href="./index.html">Hoe'im Tíhỳ 胡音體系</a>
    <nav class="siteTabs" aria-label="Section navigation">
      <a class="siteTab" href="./index.html">字から音</a>
      <a class="siteTab" href="./sound-search.html">音から字</a>
      <a class="siteTab" href="./mc-tools.html">聲韻検索</a>
      <a class="siteTab current" href="./text-reader.html">文章読音</a>
    </nav>
  </header>

  <section class="card toolCard">
    <div class="sectionHeaderRow">
      <h2 class="sectionTitle">文章読音</h2>
      <details class="infoToggle">
        <summary aria-label="このページと使い方"><span class="infoIcon" aria-hidden="true">ⓘ</span></summary>
        <div class="infoPanel">
          <div class="infoLine">文章全体を読音列に変換し、多音字だけをその場で選び直しながら確定形を整えられます。</div>
          <div class="infoLine">漢字テキストを入力すると、この体系の読音列に変換します。多音字は小さいボタンで読音を選べます。</div>
        </div>
      </details>
    </div>
    <div id="status" class="status warn">辞書を自動読み込み中…</div>
    <div id="sampleNote" class="selectionMeta"></div>

    <div class="filterPanel searchPanel">
      <div class="sectionHeaderRow sectionHeaderRowLabel">
        <div class="sectionLabel">入力</div>
        <details class="infoToggle">
          <summary aria-label="操作ヒント"><span class="infoIcon" aria-hidden="true">ⓘ</span></summary>
          <div class="infoPanel">`Ctrl` / `Cmd` + `Enter` でも変換できます。</div>
        </details>
      </div>
      <textarea id="sampleInput" class="textAreaInput" placeholder="漢字テキストを入力 例：春眠不覺曉"></textarea>
      <div class="row actionRow">
        <button id="sampleRunBtn" class="btnAccent">変換</button>
        <button id="sampleDemoBtn" class="btnSecondary">デモ</button>
      </div>
    </div>

    <div class="filterPanel searchPanel">
      <div class="sectionLabel">読音調整</div>
      <div id="sampleInteractive" class="transcriptionComposer" aria-live="polite">ここに読音列が出ます。</div>
    </div>

    <div class="filterPanel searchPanel">
      <div class="sectionLabel">確定読音列</div>
      <textarea id="sampleOutput" class="textAreaOutput" readonly placeholder="ここに確定読音列が出ます"></textarea>
    </div>
    <div id="sampleHoverMemo" class="floatingMemo" aria-hidden="true"></div>
  </section>
</div>

<script src="./Kuankhiunn0704.txt.js?v=20260331a"></script>
<script src="./dictionary-core.js?v=20260403a"></script>
<script>
const core = window.HuDictionaryCore;
let dictionary = null;
let sampleTokens = [];
const DEFAULT_SOURCE_URL = `./${core.LOCAL_SOURCE_NAME}`;

function setStatus(msg, kind = "warn"){
  const el = document.getElementById("status");
  el.className = `status ${kind}`;
  if (kind === "ok") {
    el.innerHTML = `
      <span class="statusContent">
        <span class="statusCheck" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <circle class="statusCheckCircle" cx="12" cy="12" r="10"></circle>
            <path class="statusCheckMark" d="M7.6 12.3l3 3.1 5.8-6.2"></path>
          </svg>
        </span>
        <span class="statusText">${core.escapeHtml(msg)}</span>
      </span>
    `;
    return;
  }
  el.textContent = msg;
}

function hideHoverMemo(){
  const memo = document.getElementById("sampleHoverMemo");
  memo.classList.remove("visible");
  memo.textContent = "";
}

function moveHoverMemo(clientX, clientY){
  const memo = document.getElementById("sampleHoverMemo");
  memo.style.left = `${clientX + 14}px`;
  memo.style.top = `${clientY + 14}px`;
}

function showHoverMemo(char, event){
  const memo = document.getElementById("sampleHoverMemo");
  memo.textContent = char;
  memo.classList.add("visible");
  moveHoverMemo(event.clientX, event.clientY);
}

function attachHoverMemo(target, char){
  target.addEventListener("pointerenter", (event) => {
    if (event.pointerType === "touch") return;
    showHoverMemo(char, event);
  });
  target.addEventListener("pointermove", (event) => {
    if (event.pointerType === "touch") return;
    moveHoverMemo(event.clientX, event.clientY);
  });
  target.addEventListener("pointerleave", hideHoverMemo);
  target.addEventListener("blur", hideHoverMemo);
}

function buildSampleTokens(text){
  const tokens = [];
  const missingChars = new Set();
  let prevWasReading = false;

  for (const ch of Array.from(text)){
    if (!core.isCjkIdeograph(ch)) {
      tokens.push({ type: "text", text: ch });
      prevWasReading = false;
      continue;
    }

    const readings = core.getCharReadings(dictionary, ch);
    if (prevWasReading) tokens.push({ type: "separator", text: " " });

    if (!readings.length) {
      tokens.push({ type: "missing", char: ch, text: ch });
      missingChars.add(ch);
    } else if (readings.length === 1) {
      tokens.push({ type: "fixed", char: ch, reading: readings[0] });
    } else {
      tokens.push({ type: "choice", char: ch, readings, selectedIndex: null, expanded: true });
    }

    prevWasReading = true;
  }

  return {
    tokens,
    missingChars: Array.from(missingChars)
  };
}

function getResolvedSampleOutput(){
  const resolved = sampleTokens.map((token) => {
    if (token.type === "choice") {
      if (Number.isInteger(token.selectedIndex)) {
        return token.readings[token.selectedIndex] || token.readings[0] || "";
      }
      return `(${token.readings.join(" / ")})`;
    }
    if (token.type === "fixed") return token.reading;
    if (token.text === "、") return ",";
    if (token.text === "。") return ".";
    if (token.text === "「" || token.text === "」") return "\"";
    return token.text || "";
  }).join("");

  return resolved.replace(/\.(?=\S)/g, ". ");
}

function updateSampleOutput(){
  document.getElementById("sampleOutput").value = getResolvedSampleOutput();
}

function renderInteractiveSample(){
  const container = document.getElementById("sampleInteractive");
  container.innerHTML = "";
  hideHoverMemo();

  if (!sampleTokens.length) {
    container.textContent = "ここに読音列が出ます。";
    return;
  }

  sampleTokens.forEach((token) => {
    if (token.type === "text" || token.type === "separator") {
      container.appendChild(document.createTextNode(token.text));
      return;
    }

    if (token.type === "fixed") {
      const span = document.createElement("span");
      span.className = "transcriptionToken transcriptionHoverTarget";
      span.textContent = token.reading;
      attachHoverMemo(span, token.char);
      container.appendChild(span);
      return;
    }

    if (token.type === "missing") {
      const span = document.createElement("span");
      span.className = "transcriptionToken transcriptionMissing";
      span.textContent = token.text;
      container.appendChild(span);
      return;
    }

    if (token.type === "choice") {
      if (!token.expanded) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "transcriptionChoice selected";
        button.textContent = token.readings[token.selectedIndex] || token.readings[0] || "";
        button.setAttribute("aria-label", `${token.char} の読音を再選択`);
        attachHoverMemo(button, token.char);
        button.addEventListener("click", () => {
          token.expanded = true;
          renderInteractiveSample();
        });
        container.appendChild(button);
        return;
      }

      const group = document.createElement("span");
      group.className = "transcriptionChoices";

      token.readings.forEach((reading, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "transcriptionChoice";
        button.textContent = reading;
        button.setAttribute("aria-label", `${token.char} の読音 ${reading}`);
        attachHoverMemo(button, token.char);
        button.addEventListener("click", () => {
          token.selectedIndex = index;
          token.expanded = false;
          renderInteractiveSample();
          updateSampleOutput();
        });
        group.appendChild(button);
      });

      container.appendChild(group);
    }
  });
}

function renderSampleText(){
  const output = document.getElementById("sampleOutput");
  const note = document.getElementById("sampleNote");
  const interactive = document.getElementById("sampleInteractive");

  if (!dictionary){
    sampleTokens = [];
    interactive.textContent = "ここに読音列が出ます。";
    output.value = "";
    note.textContent = "";
    return;
  }

  const input = document.getElementById("sampleInput").value;
  if (!input.trim()) {
    sampleTokens = [];
    interactive.textContent = "ここに読音列が出ます。";
    output.value = "";
    note.textContent = "";
    return;
  }

  const result = buildSampleTokens(input);
  sampleTokens = result.tokens;
  renderInteractiveSample();
  updateSampleOutput();

  const choiceCount = sampleTokens.filter((token) => token.type === "choice").length;
  const noteParts = [];
  noteParts.push(choiceCount
    ? `多音字 ${choiceCount} か所はボタンで読音を選べます。`
    : "読音列を生成しました。");
  if (result.missingChars.length) {
    noteParts.push(`未収字: ${result.missingChars.join(" ")}`);
  }
  note.textContent = noteParts.join(" ");
}

async function loadDictionary(rawUrl = DEFAULT_SOURCE_URL){
  try {
    setStatus(`取得中… ${core.normalizeTextUrl(rawUrl)}`, "warn");
    const result = await core.loadDictionaryFromUrl(rawUrl);
    dictionary = result.dictionary;
    renderSampleText();
    setStatus(
      "読み込み完了",
      dictionary.stats.missingCount ? "warn" : "ok"
    );
  } catch (error) {
    setStatus(`取得失敗：${String(error)}`, "bad");
  }
}

document.getElementById("sampleRunBtn").addEventListener("click", renderSampleText);
document.getElementById("sampleInput").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") renderSampleText();
});
document.getElementById("sampleDemoBtn").addEventListener("click", () => {
  document.getElementById("sampleInput").value = "春眠不覺曉";
  renderSampleText();
});

window.addEventListener("DOMContentLoaded", () => {
  loadDictionary();
});
</script>
</body>
</html>
