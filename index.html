<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hoe'im Tíhỳ 胡音體系 | 字から音</title>
  <link rel="stylesheet" href="./site.css?v=20260403n" />
</head>
<body>
<div class="wrap">
  <header class="siteHeader">
    <a class="brand" href="./index.html">Hoe'im Tíhỳ 胡音體系</a>
    <nav class="siteTabs" aria-label="Section navigation">
      <a class="siteTab current" href="./index.html">字から音</a>
      <a class="siteTab" href="./sound-search.html">音から字</a>
      <a class="siteTab" href="./mc-tools.html">聲韻検索</a>
      <a class="siteTab" href="./text-reader.html">文章読音</a>
    </nav>
  </header>

  <section class="card toolCard">
    <div>
      <div class="sectionLabel">字から音</div>
      <div class="sectionHeaderRow">
        <h2 class="sectionTitle">漢字から読音を引く</h2>
        <details class="infoToggle">
          <summary aria-label="このページと使い方"><span class="infoIcon" aria-hidden="true">ⓘ</span></summary>
          <div class="infoPanel">
            <div class="infoLine">同じ辞書を使って、字から音、音から字、聲韻検索、文章読音を切り替えながら確認できます。</div>
            <div class="infoLine">複数字をまとめて検索して、読音と中古音情報を一件ずつ確認できます。</div>
          </div>
        </details>
      </div>
    </div>

    <div class="filterPanel searchPanel">
      <div class="sectionHeaderRow sectionHeaderRowLabel">
        <div class="sectionLabel">検索</div>
        <details class="infoToggle">
          <summary aria-label="検索ヒント"><span class="infoIcon" aria-hidden="true">ⓘ</span></summary>
          <div class="infoPanel">同一字に複数音があればリスト表示します。</div>
        </details>
      </div>
      <div class="row">
        <input id="q" type="text" aria-label="検索する漢字" placeholder="漢字を入力（複数OK）例：東同中蟲…" autocomplete="off" />
        <button id="searchBtn" class="btnAccent">検索</button>
        <button id="demoBtn" class="btnSecondary">デモ</button>
      </div>
    </div>

    <div id="status" class="status warn">辞書を自動読み込み中…</div>

    <div>
      <div class="sectionLabel">検索結果</div>
      <div id="out" class="out"></div>
    </div>
  </section>

  <section class="card toolCard">
    <div>
      <div class="sectionLabel">診断</div>
      <div class="sectionHeaderRow">
        <h2 class="sectionTitle">韻データの抽出結果</h2>
        <details class="infoToggle">
          <summary aria-label="この欄の説明"><span class="infoIcon" aria-hidden="true">ⓘ</span></summary>
          <div class="infoPanel">辞書読み込み時に収集した韻名一覧と未対応キーを確認できます。</div>
        </details>
      </div>
    </div>
    <details>
      <summary>抽出結果（韻名一覧 / 未対応韻キー）</summary>
      <div class="small">
        <div class="mono" style="margin:8px 0 4px">韻名（rimeName）一覧</div>
        <textarea id="rimeNames" readonly></textarea>
        <div class="mono" style="margin:10px 0 4px">未対応の韻キー（RIME_ROMAN に無い）</div>
        <textarea id="missingKeys" readonly></textarea>
      </div>
    </details>
  </section>
</div>

<script src="./Kuankhiunn0704.txt.js?v=20260331a"></script>
<script src="./dictionary-core.js?v=20260403a"></script>
<script>
const core = window.HuDictionaryCore;
let dictionary = null;
const DEFAULT_SOURCE_URL = `./${core.LOCAL_SOURCE_NAME}`;

function setStatus(msg, kind = "warn"){
  const el = document.getElementById("status");
  el.className = `status ${kind}`;
  if (kind === "ok") {
    el.innerHTML = `
      <span class="statusContent">
        <span class="statusCheck" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <circle class="statusCheckCircle" cx="12" cy="12" r="10"></circle>
            <path class="statusCheckMark" d="M7.6 12.3l3 3.1 5.8-6.2"></path>
          </svg>
        </span>
        <span class="statusText">${core.escapeHtml(msg)}</span>
      </span>
    `;
    return;
  }
  el.textContent = msg;
}

function fillDiagnostics(dict){
  document.getElementById("rimeNames").value = dict.rimeNames.join("\n");
  document.getElementById("missingKeys").value = dict.missingKeys.join("\n");
}

function render(){
  const out = document.getElementById("out");
  out.innerHTML = "";

  if (!dictionary){
    out.innerHTML = '<div class="status warn">DBが未読み込みです。</div>';
    return;
  }

  const input = document.getElementById("q").value.trim();
  if (!input) return;

  const chars = Array.from(input).filter(core.isCjkIdeograph);
  if (chars.length === 0) return;

  for (const ch of chars){
    const hits = dictionary.charIndex.get(ch) || [];
    const block = document.createElement("div");
    block.className = "charBlock";

    const title = document.createElement("div");
    title.className = "charTitle";
    title.innerHTML = `<div class="han">${core.escapeHtml(ch)}</div><div class="meta">一致件数：${hits.length}</div>`;
    block.appendChild(title);

    if (!hits.length){
      const empty = document.createElement("div");
      empty.className = "status warn";
      empty.textContent = "該当なし";
      block.appendChild(empty);
      out.appendChild(block);
      continue;
    }

    hits.forEach((entry, index) => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div class="entryHeader">
          <span class="tag">#${index + 1}</span>
          <span class="tag">小韻：${core.escapeHtml(entry.xiaoyun)}</span>
          <span class="tag">中古：${core.escapeHtml(entry.mc.initialMu)} + ${core.escapeHtml(entry.mc.rimeKey)}（${core.escapeHtml(entry.mc.tone)}）</span>
        </div>
        <div class="reading mono">${core.escapeHtml(entry.conv.ok ? entry.conv.reading : "（変換エラー）")}</div>
        <div class="small mono">${core.escapeHtml(entry.conv.ok ? `init=${entry.conv.debug.initialRoman || "∅"} / rime=${entry.conv.debug.rimeRoman} / 乙類=${entry.conv.debug.isB}` : entry.conv.error)}</div>
      `;
      block.appendChild(div);
    });

    out.appendChild(block);
  }
}

async function loadDictionary(rawUrl = DEFAULT_SOURCE_URL){
  try {
    setStatus(`取得中… ${core.normalizeTextUrl(rawUrl)}`, "warn");
    const result = await core.loadDictionaryFromUrl(rawUrl);
    dictionary = result.dictionary;
    fillDiagnostics(dictionary);
    setStatus(
      "読み込み完了",
      dictionary.stats.missingCount ? "warn" : "ok"
    );
    render();
  } catch (error) {
    setStatus(`取得失敗：${String(error)}`, "bad");
  }
}

document.getElementById("searchBtn").addEventListener("click", render);
document.getElementById("q").addEventListener("keydown", (e) => {
  if (e.key === "Enter") render();
});
document.getElementById("demoBtn").addEventListener("click", () => {
  document.getElementById("q").value = "春眠不覺曉";
  render();
});

window.addEventListener("DOMContentLoaded", () => {
  loadDictionary();
});
</script>
</body>
</html>
