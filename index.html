<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Huueim Téyhèoy 胡音體系 | 字から音</title>
  <link rel="stylesheet" href="./site.css" />
</head>
<body>
<div class="wrap">
  <header class="siteHeader">
    <a class="brand" href="./index.html">Huueim Téyhèoy 胡音體系</a>
    <nav class="siteTabs" aria-label="Section navigation">
      <a class="siteTab current" href="./index.html">字から音</a>
      <a class="siteTab" href="./sound-search.html">音から字</a>
    </nav>
  </header>

  <div class="card">
    <div class="grid2">
      <div>
        <div class="row">
          <input id="url" type="url"
            aria-label="辞書ソースURL"
            value="./Kuankhiunn0704.txt"
            placeholder="Kuankhiunn0704.txt のURL（blobでもOK）" />
          <button id="loadUrlBtn" class="btnAccent">自動取得して読み込み</button>
        </div>
        <div class="hint">
        </div>
      </div>

      <div>
        <div class="row">
          <input id="q" type="text" aria-label="検索する漢字" placeholder="漢字を入力（複数OK）例：東同中蟲…" autocomplete="off" />
          <button id="searchBtn" class="btnAccent">検索</button>
          <button id="demoBtn" class="btnSecondary">デモ</button>
        </div>
        <div class="hint">
          ・同一字に複数音があればリスト表示します。<br>
        </div>
      </div>
    </div>

    <div id="status" class="status warn">未読み込み：上のURLから読み込んでください。</div>

    <details>
      <summary>抽出結果（韻名一覧 / 未対応韻キー）</summary>
      <div class="small">
        <div class="mono" style="margin:8px 0 4px">韻名（rimeName）一覧</div>
        <textarea id="rimeNames" readonly></textarea>
        <div class="mono" style="margin:10px 0 4px">未対応の韻キー（RIME_ROMAN に無い）</div>
        <textarea id="missingKeys" readonly></textarea>
      </div>
    </details>

    <div id="out" class="out"></div>
  </div>
</div>

<script src="./Kuankhiunn0704.txt.js"></script>
<script src="./dictionary-core.js"></script>
<script>
const core = window.HuDictionaryCore;
let dictionary = null;

function setStatus(msg, kind = "warn"){
  const el = document.getElementById("status");
  el.className = `status ${kind}`;
  el.textContent = msg;
}

function bindTap(el, fn){
  let locked = false;
  const run = async (e) => {
    if (locked) return;
    locked = true;
    try {
      await fn(e);
    } finally {
      setTimeout(() => { locked = false; }, 350);
    }
  };
  el.addEventListener("click", run);
  el.addEventListener("pointerup", run);
  el.addEventListener("touchend", (e) => {
    e.preventDefault();
    run(e);
  }, { passive: false });
}

function fillDiagnostics(dict){
  document.getElementById("rimeNames").value = dict.rimeNames.join("\n");
  document.getElementById("missingKeys").value = dict.missingKeys.join("\n");
}

function render(){
  const out = document.getElementById("out");
  out.innerHTML = "";

  if (!dictionary){
    out.innerHTML = '<div class="status warn">DBが未読み込みです。</div>';
    return;
  }

  const input = document.getElementById("q").value.trim();
  if (!input) return;

  const chars = Array.from(input).filter(core.isCjkIdeograph);
  if (chars.length === 0) return;

  for (const ch of chars){
    const hits = dictionary.charIndex.get(ch) || [];
    const block = document.createElement("div");
    block.className = "charBlock";

    const title = document.createElement("div");
    title.className = "charTitle";
    title.innerHTML = `<div class="han">${core.escapeHtml(ch)}</div><div class="meta">一致件数：${hits.length}</div>`;
    block.appendChild(title);

    if (!hits.length){
      const empty = document.createElement("div");
      empty.className = "status warn";
      empty.textContent = "該当なし";
      block.appendChild(empty);
      out.appendChild(block);
      continue;
    }

    hits.forEach((entry, index) => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div class="entryHeader">
          <span class="tag">#${index + 1}</span>
          <span class="tag">小韻：${core.escapeHtml(entry.xiaoyun)}</span>
          <span class="tag">中古：${core.escapeHtml(entry.mc.initialMu)} + ${core.escapeHtml(entry.mc.rimeKey)}（${core.escapeHtml(entry.mc.tone)}）</span>
        </div>
        <div class="reading mono">${core.escapeHtml(entry.conv.ok ? entry.conv.reading : "（変換エラー）")}</div>
        <div class="small mono">${core.escapeHtml(entry.conv.ok ? `init=${entry.conv.debug.initialRoman || "∅"} / rime=${entry.conv.debug.rimeRoman} / 乙類=${entry.conv.debug.isB}` : entry.conv.error)}</div>
      `;
      block.appendChild(div);
    });

    out.appendChild(block);
  }
}

async function loadDictionary(){
  const rawUrl = document.getElementById("url").value.trim();
  if (!rawUrl) {
    setStatus("URLが空です。", "bad");
    return;
  }

  try {
    setStatus(`取得中… ${core.normalizeTextUrl(rawUrl)}`, "warn");
    const result = await core.loadDictionaryFromUrl(rawUrl);
    dictionary = result.dictionary;
    fillDiagnostics(dictionary);
    setStatus(
      `読み込み完了：索引文字数=${dictionary.stats.charCount} / 未対応キー=${dictionary.stats.missingCount}`,
      dictionary.stats.missingCount ? "warn" : "ok"
    );
    render();
  } catch (error) {
    setStatus(`取得失敗：${String(error)}`, "bad");
  }
}

bindTap(document.getElementById("loadUrlBtn"), loadDictionary);

document.getElementById("searchBtn").addEventListener("click", render);
document.getElementById("q").addEventListener("keydown", (e) => {
  if (e.key === "Enter") render();
});
document.getElementById("demoBtn").addEventListener("click", () => {
  document.getElementById("q").value = "春眠不覺曉";
  render();
});

window.addEventListener("DOMContentLoaded", () => {
  if (document.getElementById("url").value.trim()) {
    loadDictionary();
  }
});
</script>
</body>
</html>
